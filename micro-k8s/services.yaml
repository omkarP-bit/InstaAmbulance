apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: queuecure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service:latest
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: queuecure-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: queuecure
spec:
  selector:
    app: auth-service
  ports:
  - port: 3002
    targetPort: 3002
---
